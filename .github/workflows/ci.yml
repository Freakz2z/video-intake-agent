name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - name: Install package and test tools
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: Build package
        run: python -m build
      - name: Verify command installation
        run: |
          video-intake --help
          video-intake-mcp --help
          video-intake-mcp-client
