    <rect x="85" y="49" width="16" height="8" rx="4"/>
    <rect x="139" y="49" width="16" height="8" rx="4"/>
    <rect x="165" y="49" width="16" height="8" rx="4"/>
  </g>
  <path d="M103 76.5a8 8 0 0 1 12-6.9l34 19.5a8 8 0 0 1 0 13.8l-34 19.5a8 8 0 0 1-12-6.9v-39Z" fill="url(#accent)" filter="url(#glow)"/>
  <path d="M120 148v31m0 0-14-14m14 14 14-14" fill="none" stroke="#A5B4FC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M65 174v17a13 13 0 0 0 13 13h84a13 13 0 0 0 13-13v-17" fill="none" stroke="url(#accent)" stroke-width="9" stroke-linecap="round"/>
