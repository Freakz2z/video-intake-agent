<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">Video Intake Agent</title>
  <desc id="desc">A video card entering an archive tray</desc>
  <defs>
    <linearGradient id="bg" x1="28" y1="20" x2="212" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111C3A"/>
      <stop offset="1" stop-color="#080C18"/>
    </linearGradient>
    <linearGradient id="accent" x1="48" y1="42" x2="194" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="224" height="224" rx="54" fill="url(#bg)"/>
  <rect x="42" y="38" width="156" height="104" rx="24" fill="#0D1730" stroke="url(#accent)" stroke-width="8"/>
